spring.application.name=backend

# spring db connection properties
spring.datasource.url=jdbc:mysql://localhost:3306/triplet_db
spring.datasource.username=root
spring.datasource.password=root

# date format
spring.mvc.format.date=dd-MM-yyyy

# spring data config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# makes it easier to extract query from the import.sql file
spring.jpa.properties.hibernate.hbm2ddl.import_files_sql_extractor=org.hibernate.tool.schema.internal.script.MultiLineSqlScriptExtractor