<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{ fragments/imports :: head }"></div>
    <title>Create Album</title>
</head>

<body class="bg-body-secondary" style="margin-top: 120px;">
    <header>
        <div th:replace="~{ fragments/navbar :: navbar }"></div>
        <div th:replace="~{ fragments/offcanvas :: offcanvas }"></div>
    </header>
    
    <main th:object="${album}">
        <div class="container bg-white rounded-3 p-3 mb-5">
            <h3 class="fw-light">Create a new Album</h3>
            <form th:action="@{/albums/create}" method="POST">
                <label for="title" class="form-label mt-3">Title</label>
                <input type="text" th:field="*{title}" id="title" class="form-control" th:errorClass="is-invalid">
                <div th:if="${#fields.hasErrors('title')}" class="invalid-feedback">
                    <li th:each="err : ${#fields.errors('title')}" th:text="${err}"></li>
                </div>
                <label for="bandOrArtist" class="form-label mt-3">Artist</label>
                <input type="text" th:field="*{bandOrArtist}" id="bandOrArtist" class="form-control"
                    th:errorClass="is-invalid">
                <div th:if="${#fields.hasErrors('bandOrArtist')}" class="invalid-feedback">
                    <li th:each="err : ${#fields.errors('bandOrArtist')}" th:text="${err}"></li>
                </div>
                <label for="length" class="form-label mt-3">Length (HH:mm)</label>
                <input type="text" th:field="*{length}" id="length" class="form-control" th:errorClass="is-invalid">
                <div th:if="${#fields.hasErrors('length')}" class="invalid-feedback">
                    <li th:each="err : ${#fields.errors('length')}" th:text="${err}"></li>
                </div>
                <label for="releaseDate" class="form-label mt-3">Release Date</label>
                <input type="date" th:field="*{releaseDate}" id="releaseDate" class="form-control"
                    th:errorClass="is-invalid">
                <div th:if="${#fields.hasErrors('releaseDate')}" class="invalid-feedback">
                    <li th:each="err : ${#fields.errors('releaseDate')}" th:text="${err}"></li>
                </div>
                <label for="img" class="form-label mt-3">Image URL</label>
                <input type="text" th:field="*{img}" id="img" class="form-control" th:errorClass="is-invalid">
                <div th:if="${#fields.hasErrors('img')}" class="invalid-feedback">
                    <li th:each="err : ${#fields.errors('img')}" th:text="${err}"></li>
                </div>
                <label for="description" class="form-label mt-3">Description</label>
                <input type="text" th:field="*{description}" id="description" class="form-control"
                    th:errorClass="is-invalid">
                <div th:if="${#fields.hasErrors('description')}" class="invalid-feedback">
                    <li th:each="err : ${#fields.errors('description')}" th:text="${err}"></li>
                </div>

                <div class="d-flex mt-3 justify-content-between">
                    <button type="submit" class="btn btn-sm bg-primary-subtle">Create</button>
                    <button type="reset" class="btn btn-sm bg-warning-subtle">Reset</button>
                </div>
            </form>
        </div>
    </main>

    <footer>

    </footer>
    <!-- Bootstrap js -->
    <div th:replace="~{ fragments/imports :: bsScript }"></div>
</body>

</html>
